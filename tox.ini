[tox]
envlist =
    py{310,311,312,313,314}-django{42,50,51}
    py{312,313,314}-django60
    lint
skip_missing_interpreters = true

[testenv]
package = wheel
wheel_build_env = .pkg
deps =
    django42: django~=4.2.0
    django50: django~=5.0.0
    django51: django~=5.1.0
    django60: django~=6.0.0
    pytest
    pytest-django
commands =
    pytest tests/ -v --tb=short

[testenv:lint]
basepython = python3.11
deps =
    ruff
commands =
    ruff check og_django_utils tests
    ruff format --check og_django_utils tests

[testenv:build]
basepython = python3.11
skip_install = true
deps =
    build
commands =
    python -m build
